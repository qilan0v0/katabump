name: Deploy KV Cookie Admin

on:
  workflow_dispatch: # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wrangler
      run: npm install -g wrangler

    - name: Deploy Worker
      working-directory: kv-admin
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      run: |
        # 先创建或更新 secret
        echo "${{ secrets.KV_ADMIN_PASS }}" | wrangler secret put KV_ADMIN_PASS 2>/dev/null || true
        # 部署
        wrangler deploy