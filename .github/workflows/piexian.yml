name: pie-xian Daily Checkin

on:
  schedule:
    # 每天 UTC 21:30 运行（即北京时间次日 05:30），与 hcnsec 错开
    - cron: '30 21 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checkin
        env:
          CHECKIN_USERS_JSON: ${{ secrets.PIEXIAN_USERS_JSON }}
          BASE_URL: https://api.pie-xian.com
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python checkin_multi.py

      - name: Clear old run jobs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "deleted: $run_id"
              gh run delete $run_id || true
            fi
          done