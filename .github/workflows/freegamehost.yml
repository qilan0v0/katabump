name: FreeGameHost Auto Renew

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: 🟢 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 安装 v2ray (用于 per-user V2 代理)
      # 脚本根据每个用户的 V2 字段启动独立 v2ray 实例，无需全局 V2RAY_VMESS
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: 🛠️ 安装依赖
      run: |
        sudo apt-get update -q
        sudo apt-get install -y xvfb
        npm install
        npx playwright install chromium 2>/dev/null || true

    - name: 🚀 运行续期脚本
      env:
        PROJECT_NAME: FreeGameHost
        FREEGAMEHOST_USERS_JSON: ${{ secrets.FREEGAMEHOST_USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        KV_ADMIN_URL: ${{ secrets.KV_ADMIN_URL }}
        KV_ADMIN_PASS: ${{ secrets.KV_ADMIN_PASS }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
      run: |
        mkdir -p screenshots
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
          node freegamehost_renew.js

    - name: 📸 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fgh-screenshots
        path: screenshots/
