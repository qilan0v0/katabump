name: FreeGameHost Auto Renew

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: 🐍 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 🛡️ 启动 GOST 代理转发
      if: ${{ env.GOST_PROXY != '' }}
      env:
        GOST_PROXY: ${{ secrets.GOST_PROXY }}
      run: |
        VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
          | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        echo "📦 GOST 版本: $VERSION"
        wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
        tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
        chmod +x gost
        nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
        sleep 3
        echo "✅ GOST 已启动，测试连通性..."
        curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

    - name: 🛠️ 安装系统依赖
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          xvfb \
          x11-utils \
          xdotool

    - name: 🐍 安装 Python 依赖
      run: |
        pip install seleniumbase
        seleniumbase install chromedriver

    - name: 🚀 运行续期脚本
      env:
        FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
        FREEGAMEHOST_USERS_JSON: ${{ secrets.FREEGAMEHOST_USERS_JSON }}
        GOST_PROXY: ${{ secrets.GOST_PROXY }}
        TG_BOT: ${{ secrets.TG_BOT }}
      run: |
        mkdir -p screenshots
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python freegamehost_renew.py

    - name: 📸 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fgh-screenshots
        path: screenshots/