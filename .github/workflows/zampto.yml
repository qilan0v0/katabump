name: Zampto Auto Renew

on:
  schedule:
    # 每天北京时间凌晨 3 点 (UTC 前一天 19:05) 运行；偏 5 分钟避开整点拥堵
    - cron: '5 19 * * *'
  workflow_dispatch: # 允许手动触发

# 提前切到 Node.js 24 运行 actions/*，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    - name: Run Zampto Renew Script
      env:
        PROJECT_NAME: Zampto
        # Secret ZAMPTO_USERS_JSON 格式:
        # [{"username":"xxx","password":"xxx","serverUrl":"https://..."}]
        ZAMPTO_USERS_JSON: ${{ secrets.ZAMPTO_USERS_JSON }}
        # Cloudflare KV：缓存登录 cookie，免每次登录。三者都配齐才启用
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node zampto_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zampto-screenshots
        path: screenshots/
