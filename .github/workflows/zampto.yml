name: Zampto Auto Renew

on:
  schedule:
    # 每天北京时间凌晨 3 点 (UTC 前一天 19:05) 运行；偏 5 分钟避开整点拥堵
    - cron: '5 19 * * *'
  workflow_dispatch: # 允许手动触发

# 提前切到 Node.js 24 运行 actions/*，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    - name: Install v2ray
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: Run Zampto Renew Script
      env:
        PROJECT_NAME: Zampto
        # Secret ZAMPTO_USERS_JSON 格式:
        # [{"username":"xxx","password":"xxx","serverUrl":"https://...","proxy":"vmess://..."}]
        # 每个用户可通过 proxy 字段指定自己的代理节点，脚本自动启停
        ZAMPTO_USERS_JSON: ${{ secrets.ZAMPTO_USERS_JSON }}
        # KV Admin Worker：缓存登录 cookie，免每次登录
        KV_ADMIN_URL: ${{ secrets.KV_ADMIN_URL }}
        KV_ADMIN_PASS: ${{ secrets.KV_ADMIN_PASS }}
        # 全局回退代理（用户未配置 vmess 时使用）
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        V2RAY_BIN: ${{ format('{0}/v2ray/v2ray', env.HOME) }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node zampto_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zampto-screenshots
        path: screenshots/
