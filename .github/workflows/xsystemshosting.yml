name: X Systems Hosting Login

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chromium
        npx playwright install chromium

    - name: Run XSH Login Script
      env:
        # XSH_USERS_JSON = [{"Discord-token":"MTM3..."}]
        XSH_USERS_JSON: ${{ secrets.XSH_USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        CI: 'true'
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node xsh_login.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xsh-screenshots
        path: screenshots/