name: XServer Game Auto Renew

on:
  workflow_dispatch: # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    env:
      HAS_V2RAY: ${{ secrets.V2RAY_VMESS != '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --quiet requests
        sudo apt-get update
        sudo apt-get install -y xvfb 2>/dev/null || true

    - name: Install v2ray (用于账号独立 V2 代理或全局 V2 代理)
      if: env.HAS_V2RAY == 'true'
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: Start v2ray (全局代理层)
      if: env.HAS_V2RAY == 'true'
      env:
        V2RAY_VMESS: ${{ secrets.V2RAY_VMESS }}
      run: |
        if [ -z "$V2RAY_VMESS" ]; then
          echo "V2RAY_VMESS 为空，跳过全局 v2ray 启动"
          exit 0
        fi
        node .github/scripts/gen-v2ray-config.js "$V2RAY_VMESS" 10809 $HOME/v2ray/config.json
        nohup $HOME/v2ray/v2ray run -config $HOME/v2ray/config.json > $HOME/v2ray/v2ray.log 2>&1 &
        for i in $(seq 1 15); do
          if curl -fsS -x http://127.0.0.1:10809 -m 10 https://api.ipify.org > /tmp/proxy_ip 2>/dev/null; then
            echo "全局代理就绪，出口 IP: $(cat /tmp/proxy_ip)"
            break
          fi
          echo "等待 v2ray 启动... ($i)"
          sleep 2
        done
        if [ ! -s /tmp/proxy_ip ]; then
          echo "v2ray 启动失败，日志如下:"
          cat $HOME/v2ray/v2ray.log
          exit 1
        fi

    - name: Set V2RAY_BIN
      if: env.HAS_V2RAY == 'true'
      run: echo "V2RAY_BIN=$HOME/v2ray/v2ray" >> $GITHUB_ENV

    - name: Run XServer Renew Script
      env:
        # 多账号配置，JSON 数组格式
        # [{"username":"ql@282820.xyz","password":"qilan123A.","serverUrl":"https://secure.xserver.ne.jp/xapanel/xmgame/jumpvps/?id=40186001","V2":"vless://..."}]
        # V2 字段可选：有此字段则在续期该账号时启动独立 v2ray 代理；无此字段则走全局代理或直连
        XSERVER_USERS_JSON: ${{ secrets.XSERVER_USERS_JSON }}
        # 全局 HTTP 代理（由上方 v2ray 提供，或用户自定义的 HTTP_PROXY Secret）
        HTTP_PROXY: ${{ env.HAS_V2RAY == 'true' && 'http://127.0.0.1:10809' || secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python xserver_game_renew.py

    - name: Upload Debug Info
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xserver-renew-logs
        path: /tmp/v2ray_*.json
        retention-days: 3
