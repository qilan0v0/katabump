name: Rustix Auto Renew

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 0 1 * *' # 每月 1 号执行一次续期检查

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    - name: Install sing-box
      run: |
        mkdir -p $HOME/sing-box
        cd $HOME/sing-box
        LATEST=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases \
          | jq -r '[.[] | select(.prerelease==false)][0].tag_name | sub("^v"; "")')
        [ -z "$LATEST" ] && LATEST=1.13.14
        echo "下载 sing-box: v${LATEST}"
        curl -fsSL -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${LATEST}/sing-box-${LATEST}-linux-amd64.tar.gz"
        tar -xzf sing-box.tar.gz
        mv sing-box-*/sing-box ./
        rm -rf sing-box-*
        chmod +x sing-box
        ./sing-box version

    - name: Run Rustix Renew Script
      env:
        PROJECT_NAME: Rustix
        RUSTIX_USERS_JSON: ${{ secrets.RUSTIX_USERS_JSON }}
        KV_ADMIN_URL: ${{ secrets.KV_ADMIN_URL }}
        KV_ADMIN_PASS: ${{ secrets.KV_ADMIN_PASS }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node rustix_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rustix-screenshots
        path: screenshots/