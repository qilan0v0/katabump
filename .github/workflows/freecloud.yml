name: FreeCloud Daily Check-in

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      HAS_V2RAY: ${{ secrets.FREECLOUD_V2RAY_VMESS != '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install chromium-headless-shell 2>/dev/null || true

    - name: Download v2ray
      # 配置了 FREECLOUD_USERS_JSON（用户 V2 字段在脚本内按需启动独立代理）
      # 或配置了全局 FREECLOUD_V2RAY_VMESS，都需要下载 v2ray
      if: ${{ secrets.FREECLOUD_USERS_JSON != '' || secrets.FREECLOUD_V2RAY_VMESS != '' }}
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: Start global v2ray (全局 HTTP 代理)
      if: ${{ secrets.FREECLOUD_V2RAY_VMESS != '' }}
      env:
        V2RAY_VMESS: ${{ secrets.FREECLOUD_V2RAY_VMESS }}
      run: |
        node .github/scripts/gen-v2ray-config.js "$V2RAY_VMESS" 10809 $HOME/v2ray/config.json
        nohup $HOME/v2ray/v2ray run -config $HOME/v2ray/config.json > $HOME/v2ray/v2ray.log 2>&1 &
        for i in $(seq 1 15); do
          if curl -fsS -x http://127.0.0.1:10809 -m 10 https://api.ipify.org > /tmp/proxy_ip 2>/dev/null; then
            echo "✔ 全局代理就绪，出口 IP: $(cat /tmp/proxy_ip)"
            break
          fi
          echo "等待 v2ray 启动... ($i)"
          sleep 2
        done
        if [ ! -s /tmp/proxy_ip ]; then
          echo "✘ v2ray 启动失败，日志如下:"
          cat $HOME/v2ray/v2ray.log
          exit 1
        fi

    - name: Run Check-in Script
      env:
        # FREECLOUD_USERS_JSON = [{"username":"xxx@qq.com","password":"xxx"}, ...]
        # 可选 V2 字段: 每个用户可带自己的 vless:// 链接，指定该用户走独立代理
        FREECLOUD_USERS_JSON: ${{ secrets.FREECLOUD_USERS_JSON }}
        FREECLOUD_USER: ${{ secrets.FREECLOUD_USER }}
        FREECLOUD_PASS: ${{ secrets.FREECLOUD_PASS }}
        KV_ADMIN_URL: ${{ secrets.KV_ADMIN_URL }}
        KV_ADMIN_PASS: ${{ secrets.KV_ADMIN_PASS }}
        # 全局代理（用户没有独立 V2 且全局 V2RAY_VMESS 设置时使用）
        # 注意：即使没有全局 V2，用户 V2 字段也会在脚本内通过 V2RAY_BIN 启动独立 v2ray
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        PROJECT_NAME: FreeCloud
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node freecloud_checkin.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: freecloud-screenshots
        path: screenshots/
