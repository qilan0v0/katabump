name: FreeCloud Daily Check-in

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install chromium-headless-shell 2>/dev/null || true

    - name: Download v2ray
      continue-on-error: true
      # 提前下载 v2ray，如果用户 JSON 中有 V2 字段，脚本会用它启动独立代理
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: Run Check-in Script
      env:
        # FREECLOUD_USERS_JSON = [{"username":"xxx@qq.com","password":"xxx"}, ...]
        # 可选 V2 字段: 每个用户可带自己的 vless:// 链接，指定该用户走独立代理
        FREECLOUD_USERS_JSON: ${{ secrets.FREECLOUD_USERS_JSON }}
        FREECLOUD_USER: ${{ secrets.FREECLOUD_USER }}
        FREECLOUD_PASS: ${{ secrets.FREECLOUD_PASS }}
        KV_ADMIN_URL: ${{ secrets.KV_ADMIN_URL }}
        KV_ADMIN_PASS: ${{ secrets.KV_ADMIN_PASS }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        PROJECT_NAME: FreeCloud
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node freecloud_checkin.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: freecloud-screenshots
        path: screenshots/
