name: TheRose Cloud Auto Renew

on:
  workflow_dispatch: # 手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb python3-xlib scrot
        pip install seleniumbase

    - name: Install v2ray
      run: |
        mkdir -p $HOME/v2ray
        cd $HOME/v2ray
        V2RAY_URL=$(curl -fsSL https://api.github.com/repos/v2fly/v2ray-core/releases/latest \
          | grep "browser_download_url" | grep 'v2ray-linux-64\.zip"' | cut -d '"' -f 4)
        echo "下载 v2ray: $V2RAY_URL"
        curl -fsSL -o v2ray.zip "$V2RAY_URL"
        unzip -o v2ray.zip
        chmod +x v2ray
        ./v2ray version

    - name: Run TheRose Renew Script
      env:
        THEROSE_USERS_JSON: ${{ secrets.THEROSE_USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        PROJECT_NAME: TheRose
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python therose_renew.py

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: therose-screenshots
        path: "*.png"