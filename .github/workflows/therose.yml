name: TheRose Cloud Auto Renew

on:
  workflow_dispatch: # 手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install seleniumbase

    - name: Run TheRose Renew Script
      env:
        THEROSE_USERS_JSON: ${{ secrets.THEROSE_USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        PROJECT_NAME: TheRose
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python therose_renew.py

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: therose-screenshots
        path: "*.png"